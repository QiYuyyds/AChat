<title>贪吃蛇游戏</title> <content>{"html": "<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>贪吃蛇</title>\n<style>\n * { margin: 0; padding: 0; box-sizing: border-box; }\n body {\n background: #1a1a2e;\n display: flex;\n justify-content: center;\n align-items: center;\n height: 100vh;\n font-family: 'Segoe UI', Arial, sans-serif;\n overflow: hidden;\n }\n .container {\n text-align: center;\n }\n h1 {\n color: #e94560;\n font-size: 2.5rem;\n margin-bottom: 10px;\n letter-spacing: 3px;\n text-shadow: 0 0 20px rgba(233,69,96,0.5);\n }\n .score-wrap {\n display: flex;\n justify-content: center;\n gap: 30px;\n margin-bottom: 12px;\n color: #eee;\n font-size: 1.1rem;\n }\n .score-wrap span { color: #e94560; font-weight: bold; font-size: 1.3rem; }\n canvas {\n border: 2px solid #e94560;\n border-radius: 8px;\n background: #0f0f23;\n box-shadow: 0 0 30px rgba(233,69,96,0.3);\n display: block;\n margin: 0 auto;\n }\n .tip {\n margin-top: 12px;\n color: #888;\n font-size: 0.85rem;\n }\n .game-over-overlay {\n display: none;\n position: fixed;\n top: 0; left: 0; right: 0; bottom: 0;\n background: rgba(0,0,0,0.7);\n justify-content: center;\n align-items: center;\n z-index: 10;\n }\n .game-over-overlay.show { display: flex; }\n .game-over-box {\n background: #1a1a2e;\n border: 2px solid #e94560;\n border-radius: 16px;\n padding: 40px 50px;\n text-align: center;\n box-shadow: 0 0 50px rgba(233,69,96,0.5);\n }\n .game-over-box h2 {\n color: #e94560;\n font-size: 2rem;\n margin-bottom: 10px;\n }\n .game-over-box .final-score {\n color: #eee;\n font-size: 1.3rem;\n margin-bottom: 20px;\n }\n .game-over-box .best-score {\n color: #ffd700;\n font-size: 1rem;\n margin-bottom: 20px;\n }\n .game-over-box button {\n background: #e94560;\n color: #fff;\n border: none;\n padding: 12px 36px;\n font-size: 1.1rem;\n border-radius: 30px;\n cursor: pointer;\n letter-spacing: 1px;\n transition: all 0.3s;\n }\n .game-over-box button:hover {\n background: #ff6b81;\n transform: scale(1.05);\n box-shadow: 0 0 20px rgba(233,69,96,0.6);\n }\n</style>\n</head>\n<body>\n<div class=\"container\">\n <h1>🐍 贪吃蛇</h1>\n <div class=\"score-wrap\">\n <div>得分: <span id=\"score\">0</span></div>\n <div>最高: <span id=\"best\">0</span></div>\n </div>\n <canvas id=\"canvas\" width=\"400\" height=\"400\"></canvas>\n <div class=\"tip\">⬆⬇⬅➡ 方向键控制 | 空格键暂停</div>\n</div>\n<div class=\"game-over-overlay\" id=\"overlay\">\n <div class=\"game-over-box\">\n <h2>游戏结束</h2>\n <div class=\"final-score\">得分: <span id=\"finalScore\">0</span></div>\n <div class=\"best-score\">最高分: <span id=\"finalBest\">0</span></div>\n <button onclick=\"restart()\">🔄 再来一局</button>\n </div>\n</div>\n\n<script>\nconst canvas = document.getElementById('canvas');\nconst ctx = canvas.getContext('2d');\nconst scoreEl = document.getElementById('score');\nconst bestEl = document.getElementById('best');\nconst overlay = document.getElementById('overlay');\nconst finalScoreEl = document.getElementById('finalScore');\nconst finalBestEl = document.getElementById('finalBest');\n\nconst GRID = 20;\nconst COLS = canvas.width / GRID;\nconst ROWS = canvas.height / GRID;\n\nlet snake, food, dir, nextDir, score, best, gameLoop, running, paused;\nlet speed = 100;\n\nfunction init() {\n snake = [\n { x: 10, y: 10 },\n { x: 9, y: 10 },\n { x: 8, y: 10 }\n ];\n dir = { x: 1, y: 0 };\n nextDir = { x: 1, y: 0 };\n score = 0;\n paused = false;\n scoreEl.textContent = '0';\n best = parseInt(localStorage.getItem('snakeBest') || '0');\n bestEl.textContent = best;\n overlay.classList.remove('show');\n spawnFood();\n}\n\nfunction spawnFood() {\n do {\n food = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };\n } while (snake.some(s => s.x === food.x && s.y === food.y));\n}\n\nfunction draw() {\n ctx.fillStyle = '#0f0f23';\n ctx.fillRect(0, 0, canvas.width, canvas.height);\n\n // grid lines\n ctx.strokeStyle = 'rgba(255,255,255,0.03)';\n ctx.lineWidth = 0.5;\n for (let i = 0; i <= COLS; i++) {\n ctx.beginPath(); ctx.moveTo(i * GRID, 0); ctx.lineTo(i * GRID, canvas.height); ctx.stroke();\n }\n for (let i = 0; i <= ROWS; i++) {\n ctx.beginPath(); ctx.moveTo(0, i * GRID); ctx.lineTo(canvas.width, i * GRID); ctx.stroke();\n }\n\n // food\n const fx = food.x * GRID, fy = food.y * GRID;\n ctx.fillStyle = '#e94560';\n ctx.beginPath();\n ctx.arc(fx + GRID/2, fy + GRID/2, GRID/2 - 1, 0, Math.PI * 2);\n ctx.fill();\n ctx.fillStyle = '#ff6b81';\n ctx.beginPath();\n ctx.arc(fx + GRID/2 - 2, fy + GRID/2 - 2, GRID/5, 0, Math.PI * 2);\n ctx.fill();\n\n // snake\n snake.forEach((seg, i) => {\n const sx = seg.x * GRID, sy = seg.y * GRID;\n const ratio = 1 - i / (snake.length + 10);\n const r = Math.floor(15 + ratio * 80);\n const g = Math.floor(180 + ratio * 75);\n const b = Math.floor(80 + ratio * 100);\n ctx.fillStyle = `rgb(${r},${g},${b})`;\n const pad = i === 0 ? 0 : 1;\n ctx.fillRect(sx + pad, sy + pad, GRID - pad*2, GRID - pad*2);\n\n if (i === 0) {\n // eyes\n ctx.fillStyle = '#fff';\n const cx = sx + GRID/2, cy = sy + GRID/2;\n let ex1, ey1, ex2, ey2;\n if (dir.x === 1) { ex1 = cx+3; ey1 = cy-3; ex2 = cx+3; ey2 = cy+3; }\n else if (dir.x === -1) { ex1 = cx-3; ey1 = cy-3; ex2 = cx-3; ey2 = cy+3; }\n else if (dir.y === 1) { ex1 = cx-3; ey1 = cy+3; ex2 = cx+3; ey2 = cy+3; }\n else { ex1 = cx-3; ey1 = cy-3; ex2 = cx+3; ey2 = cy-3; }\n ctx.beginPath(); ctx.arc(ex1, ey1, 2.2, 0, Math.PI*2); ctx.fill();\n ctx.beginPath(); ctx.arc(ex2, ey2, 2.2, 0, Math.PI*2); ctx.fill();\n ctx.fillStyle = '#111';\n ctx.beginPath(); ctx.arc(ex1, ey1, 1, 0, Math.PI*2); ctx.fill();\n ctx.beginPath(); ctx.arc(ex2, ey2, 1, 0, Math.PI*2); ctx.fill();\n }\n });\n}\n\nfunction update() {\n dir = { ...nextDir };\n const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };\n\n // wall collision\n if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {\n gameOver();\n return;\n }\n // self collision\n if (snake.some(s => s.x === head.x && s.y === head.y)) {\n gameOver();\n return;\n }\n\n snake.unshift(head);\n\n if (head.x === food.x && head.y === food.y) {\n score += 10;\n scoreEl.textContent = score;\n if (score > best) {\n best = score;\n bestEl.textContent = best;\n localStorage.setItem('snakeBest', best);\n }\n spawnFood();\n // speed up\n if (speed > 45) {\n speed -= 1;\n clearInterval(gameLoop);\n gameLoop = setInterval(tick, speed);\n }\n } else {\n snake.pop();\n }\n\n draw();\n}\n\nfunction tick() {\n if (!paused) update();\n}\n\nfunction gameOver() {\n clearInterval(gameLoop);\n running = false;\n finalScoreEl.textContent = score;\n finalBestEl.textContent = best;\n overlay.classList.add('show');\n}\n\nfunction restart() {\n speed = 100;\n if (gameLoop) clearInterval(gameLoop);\n init();\n draw();\n running = true;\n gameLoop = setInterval(tick, speed);\n}\n\n// keyboard\nwindow.addEventListener('keydown', e => {\n if (e.key === ' ' || e.code === 'Space') {\n e.preventDefault();\n if (!running) return;\n paused = !paused;\n return;\n }\n if (!running || paused) return;\n switch (e.key) {\n case 'ArrowUp': if (dir.y !== 1) nextDir = { x: 0, y: -1 }; break;\n case 'ArrowDown': if (dir.y !== -1) nextDir = { x: 0, y: 1 }; break;\n case 'ArrowLeft': if (dir.x !== 1) nextDir = { x: -1, y: 0 }; break;\n case 'ArrowRight': if (dir.x !== -1) nextDir = { x: 1, y: 0 }; break;\n }\n});\n\n// touch swipe for mobile\nlet touchX, touchY;\ncanvas.addEventListener('touchstart', e => {\n touchX = e.touches[0].clientX;\n touchY = e.touches[0].clientY;\n});\ncanvas.addEventListener('touchend', e => {\n if (!running || paused) return;\n const dx = e.changedTouches[0].clientX - touchX;\n const dy = e.changedTouches[0].clientY - touchY;\n if (Math.abs(dx) > Math.abs(dy)) {\n if (dx > 0 && dir.x !== -1) nextDir = { x: 1, y: 0 };\n else if (dx < 0 && dir.x !== 1) nextDir = { x: -1, y: 0 };\n } else {\n if (dy > 0 && dir.y !== -1) nextDir = { x: 0, y: 1 };\n else if (dy < 0 && dir.y !== 1) nextDir = { x: 0, y: -1 };\n }\n});\n\n// start\ninit();\ndraw();\nrunning = true;\ngameLoop = setInterval(tick, speed);\n</script>\n</body>\n</html>"}</content> </write_artifact>
